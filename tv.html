<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creamo TV — Streaming</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional TV‑only overrides */
        .creamo-tv-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            background: #051225;
            min-height: 100vh;
        }
        .back-to-creamo {
            background: rgba(26, 60, 139, 0.6);
            border: 1px solid #1a3c8b;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back-to-creamo:hover {
            background: rgba(26, 60, 139, 0.8);
            transform: translateY(-2px);
        }
        .tv-nav {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(5, 18, 37, 0.8);
            border-bottom: 1px solid #1a3c8b;
            flex-wrap: wrap;
        }
        /* rest of TV styles are already in style.css */
    </style>
</head>
<body>
    <div class="creamo-tv-container" id="creamotvTool">
        <!-- TV content will be injected here by JavaScript -->
    </div>

    <script>
        // TMDB Configuration
        const TMDB_ACCESS_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJmMzhiNGYzNDdiYjExNjljZmVkZTBhY2Q4NzQ4NmZlOCIsIm5iZiI6MTc2NTk2ODc5Ny4zODEsInN1YiI6IjY5NDI4YjlkZDM4ZTVlNGQ5ZjdhMmM3YiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.KppyeeVe4_rte7wdlc2JM9PvrSkFkfO9wUTWvYAQjAg';
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
        const TMDB_IMAGE_URL = 'https://image.tmdb.org/t/p/w500';

        // State variables
        let movieCache = new Map();
        let moviePage = 1;
        let tvPage = 1;
        let searchQuery = '';
        let currentSearchType = null;
        let currentCategory = 'all';

        // DOM elements
        let tvContainer = document.getElementById('creamotvTool');

        // Setup TV when page loads
        function initTV() {
            setupTV();
        }

        function setupTV() {
            // Add back button
            const backBtn = document.createElement('button');
            backBtn.className = 'back-to-creamo';
            backBtn.textContent = '← Back to Creamo';
            backBtn.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            tvContainer.prepend(backBtn);

            // Create TV navigation
            const tvNav = document.createElement('div');
            tvNav.className = 'tv-nav';
            tvNav.innerHTML = `
                <h1 class="tv-nav-title">Creamo TV</h1>
                <div class="tv-search-container">
                    <input type="text" 
                           id="tvSearchInput" 
                           class="search-input" 
                           placeholder="Search movies & shows..." 
                           aria-label="Search for movies and TV shows">
                    <button id="tvSearchBtn" class="player-btn" style="white-space: nowrap;">Search</button>
                    <button id="tvClearSearch" class="player-btn outline" style="white-space: nowrap; display: none;">Clear</button>
                </div>
                <div style="margin-left: auto; display: flex; gap: 10px;">
                    <button class="player-btn" id="tvHomeBtn">Home</button>
                    <button class="player-btn" id="tvMoviesBtn">Movies</button>
                    <button class="player-btn" id="tvShowsBtn">TV Shows</button>
                    <button class="player-btn" id="tvTrendingBtn">Trending</button>
                </div>
            `;

            // TV Content Container
            const tvContent = document.createElement('div');
            tvContent.id = 'tvContent';
            tvContent.className = 'tv-content';

            tvContainer.appendChild(tvNav);
            tvContainer.appendChild(tvContent);

            // Load initial TV content
            loadTVHome();

            // Setup event listeners
            document.getElementById('tvHomeBtn').addEventListener('click', () => {
                resetSearch();
                loadTVHome();
            });
            document.getElementById('tvMoviesBtn').addEventListener('click', () => {
                resetSearch();
                loadTVMovies();
            });
            document.getElementById('tvShowsBtn').addEventListener('click', () => {
                resetSearch();
                loadTVShows();
            });
            document.getElementById('tvTrendingBtn').addEventListener('click', () => {
                resetSearch();
                loadTVTrending();
            });

            setupTVSearch();
        }

        function setupTVSearch() {
            const searchInput = document.getElementById('tvSearchInput');
            const searchBtn = document.getElementById('tvSearchBtn');
            const clearBtn = document.getElementById('tvClearSearch');

            searchBtn.addEventListener('click', () => {
                const query = searchInput.value.trim();
                if (query) {
                    searchTVContent(query);
                }
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (query) {
                        searchTVContent(query);
                    }
                }
            });

            clearBtn.addEventListener('click', () => {
                resetSearch();
                searchInput.value = '';
                clearBtn.style.display = 'none';
                if (currentSearchType === 'movie') {
                    loadTVMovies();
                } else if (currentSearchType === 'tv') {
                    loadTVShows();
                } else {
                    loadTVHome();
                }
            });

            searchInput.addEventListener('input', () => {
                clearBtn.style.display = searchInput.value.trim() ? 'inline-block' : 'none';
            });
        }

        async function searchTVContent(query, type = 'multi') {
            const tvContent = document.getElementById('tvContent');
            searchQuery = query;
            tvContent.innerHTML = `
                <div class="loading-section">
                    <div class="loading-spinner"></div>
                    <p>Searching for "${query}"...</p>
                </div>
            `;

            try {
                const endpoint = type === 'multi' ? 
                    `search/multi?query=${encodeURIComponent(query)}&include_adult=false` :
                    `search/${type}?query=${encodeURIComponent(query)}&include_adult=false`;
                const searchResults = await fetchTMDBData(endpoint);
                
                if (searchResults.results.length === 0) {
                    tvContent.innerHTML = `
                        <div class="tv-section">
                            <h2>🔍 Search Results for "${query}"</h2>
                            <div class="no-results">
                                <div style="font-size: 48px; margin-bottom: 20px;">🎬</div>
                                <h3>No results found</h3>
                                <p>Try a different search term</p>
                                <button class="player-btn" onclick="loadTVHome()" style="margin-top: 20px;">Back to Home</button>
                            </div>
                        </div>
                    `;
                    return;
                }

                const movies = searchResults.results.filter(item => item.media_type === 'movie');
                const tvShows = searchResults.results.filter(item => item.media_type === 'tv');
                let content = `<div class="tv-section">
                    <h2>🔍 Search Results for "${query}"</h2>
                    <p style="color: #a0a0a0; margin-bottom: 20px;">Found ${searchResults.results.length} results</p>`;
                if (movies.length > 0) {
                    content += `<h3 style="margin-top: 30px; margin-bottom: 15px; color: #e0e0e0;">🎬 Movies (${movies.length})</h3>
                        <div class="tv-content-grid">${generateMovieCards(movies.slice(0, 12))}</div>`;
                }
                if (tvShows.length > 0) {
                    content += `<h3 style="margin-top: 30px; margin-bottom: 15px; color: #e0e0e0;">📺 TV Shows (${tvShows.length})</h3>
                        <div class="tv-content-grid">${generateShowCards(tvShows.slice(0, 12))}</div>`;
                }
                content += `</div>`;
                tvContent.innerHTML = content;
                currentSearchType = type;
                setupTVCardInteractions();

            } catch (error) {
                console.error('Search error:', error);
                tvContent.innerHTML = `<div class="error-section">...</div>`;
            }
        }

        function resetSearch() {
            searchQuery = '';
            moviePage = 1;
            tvPage = 1;
            currentSearchType = null;
            currentCategory = 'all';
            const searchInput = document.getElementById('tvSearchInput');
            const clearBtn = document.getElementById('tvClearSearch');
            if (searchInput) searchInput.value = '';
            if (clearBtn) clearBtn.style.display = 'none';
        }

        async function loadTVHome() {
            const tvContent = document.getElementById('tvContent');
            tvContent.innerHTML = `<div class="loading-section">...</div>`;
            try {
                const [trendingMovies, trendingShows, popularMovies, popularShows] = await Promise.all([
                    fetchTMDBData('trending/movie/day'),
                    fetchTMDBData('trending/tv/day'),
                    fetchTMDBData('movie/popular'),
                    fetchTMDBData('tv/popular')
                ]);
                tvContent.innerHTML = `
                    <div class="tv-section"><h2>🎬 Trending Movies Today</h2><div class="tv-content-grid">${generateMovieCards(trendingMovies.results.slice(0,6))}</div></div>
                    <div class="tv-section"><h2>📺 Trending TV Shows Today</h2><div class="tv-content-grid">${generateShowCards(trendingShows.results.slice(0,6))}</div></div>
                    <div class="tv-section"><h2>🎥 Popular Movies</h2><div class="tv-content-grid">${generateMovieCards(popularMovies.results.slice(0,6))}</div></div>
                    <div class="tv-section"><h2>🎞️ Popular TV Shows</h2><div class="tv-content-grid">${generateShowCards(popularShows.results.slice(0,6))}</div></div>
                    <div class="tv-player">...</div>
                `;
                setupTVCardInteractions();
            } catch (error) { showTMDBError(tvContent, error); }
        }

        async function loadTVMovies(page = 1) {
            // ... similar to original implementation, omitted for brevity
            // (full implementation would be copied from original script.js)
        }

        async function loadTVShows(page = 1) { /* ... */ }

        function showTMDBError(container, error) { /* ... */ }
        function generateFallbackMovies() { /* ... */ }

        // Start the TV app
        initTV();
    </script>
